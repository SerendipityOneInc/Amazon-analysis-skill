name: Markdown Link Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.MD'
      - '**/*.markdown'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'
